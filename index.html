<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela de Urgências</title>
    
    <link rel="stylesheet" href="style.css">
    
</head>
<body>

    <header id="cabecalho">
        
        <img src="./img/logo-ihef-branco.png" alt="logo-ihef" id="logo-ihef"> 

        <h1 id="titulo">Exames Urgentes</h1>   

        <div id="listas">
            <ul>
                <li>Ressonância Magnética</li>
                <li>Tomografia Computadorizada</li>
                <li>Tomografia Dental</li>
                <li>Raio X Digital</li>
            </ul>
            <ul>
                <li>Mamografia Digital</li>
                <li>Densitometria Óssea</li>
                <li>Ultrassonografia</li>
                <li>Punção de Biópsia</li>
            </ul>
        </div>

    </header>

    <section>

        <div class="tag">
            <label for="id">ID:</label>
            <textarea name="id" class="campos" cols="10" rows="1"></textarea>
            <label for="nome">Nome:</label>
            <textarea name="nome" class="campos" cols="35" rows="1"></textarea>
            <label for="mod">Mod:</label>
            <select name="modalidades" id="modalidades" class="campos">
                <option value="">RM</option>
                <option value="">TC</option>
                <option value="">RX</option>
            </select>
            <label for="data">Data:</label>
            <input class="campos" type="date">

            <label for="urg">Motivo:</label>
            <select class="campos" name="status" id="status">
                <option value="">URG</option>
                <option value="">HOSP</option>
                <option value="">Concurso</option>
            </select>    

            <label for="status">Status:</label>
            <select class="campos" name="status" id="status">
                <option value="">Aberto</option>
                <option value="">Atribuído</option>
                <option value="">Liberado</option>
            </select>

            <label for="">Observações:</label>
            <textarea name="observacoes" class="campos" cols="40" rows="1"></textarea>
            
            <button id="botao" type="button">
                    <img src="./img/lixeira.png" alt="lixeira" id="lixeira">
            </button>
            

            

            
                
            

        </div>

    </section>

    <footer>
        <button id="botao-adicionar">+</button>
    </footer>

</body>
</html>
